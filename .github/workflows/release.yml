name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run package:linux
      - uses: actions/upload-artifact@v4
        with:
          name: vultd-linux
          path: dist-electron/*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run package:win
      - uses: actions/upload-artifact@v4
        with:
          name: vultd-windows
          path: dist-electron/win-unpacked/

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run package:mac
      - uses: actions/upload-artifact@v4
        with:
          name: vultd-mac
          path: dist-electron/*.dmg

  release:
    needs: [build-linux, build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/vultd-linux/*.AppImage
            artifacts/vultd-mac/*.dmg
          generate_release_notes: true
          body: |
            ## VULTD Wallet ${{ github.ref_name }}

            Non-custodial Bitcoin-backed stablecoin wallet with Monero-style privacy.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Linux    | `.AppImage` (attached) |
            | macOS    | `.dmg` (attached) |
            | Windows  | Build from source (`npm run package:win`) |

            ### Checksums
            See attached `*-checksums.txt` for SHA-256 verification.

            > **Experimental — signet only until audited.**
